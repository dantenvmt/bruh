# Known ATS Token Overrides
#
# This file maps company names to their actual ATS tokens when they differ from
# the auto-generated slug. Use this to avoid unnecessary HTTP probing for well-known
# companies.
#
# Format:
#   "Company Name":
#     greenhouse: token_or_null
#     lever: token_or_null
#     smartrecruiters: token_or_null
#
# null = company is not on that platform (skip probing)
# omitted platform = unknown, will attempt slug generation + probing

overrides:
  # Big Tech - Common abbreviations and brand names
  "IBM":
    greenhouse: ibm
    lever: ibm

  "AT&T":
    greenhouse: att
    lever: null
    smartrecruiters: ATT

  "Meta":
    greenhouse: meta
    lever: meta
    # Previously known as Facebook, board uses Meta now

  "ByteDance":
    greenhouse: bytedance
    lever: null
    # Parent company of TikTok

  "TikTok":
    greenhouse: tiktok
    lever: null
    # Separate from ByteDance careers portal

  "Block":
    greenhouse: block
    lever: block
    # Formerly Square - now uses Block branding

  "Square":
    # Redirects to Block, but may still have legacy board
    greenhouse: null
    lever: null
    # Use "Block" instead

  "LinkedIn":
    greenhouse: null
    lever: null
    # LinkedIn uses Microsoft ATS (acquired by Microsoft)

  # Finance - Complex names and abbreviations
  "JPMorgan Chase":
    greenhouse: jpmorgan
    lever: jpmorganchase
